components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    LoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]
    AuthResult:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/Staff" }
      required: [token, user]
    AuthUserOption:
      type: object
      properties:
        username: { type: string }
        fullName: { type: string }
        role: { type: string }
        password: { type: string }
      required: [username, fullName, role, password]

    Staff:
      type: object
      properties:
        id: { type: integer }
        fullName: { type: string }
        username: { type: string }
        role: { type: string, description: "admin|doctor|nurse|pharmacist|cashier|labtech|radtech|manager" }
        department: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        salary: { type: ["number", "null"] }
        joinedAt: { type: string, format: date-time }
      required: [id, fullName, username, role, joinedAt]
    CreateStaffBody:
      type: object
      properties:
        fullName: { type: string }
        username: { type: string }
        password: { type: string }
        role: { type: string }
        department: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        salary: { type: ["number", "null"] }
      required: [fullName, username, password, role]
    UpdateStaffBody:
      type: object
      properties:
        fullName: { type: string }
        department: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        salary: { type: ["number", "null"] }
        role: { type: string }

    Patient:
      type: object
      properties:
        id: { type: integer }
        mrn: { type: string, description: "Medical Record Number" }
        fullName: { type: string }
        gender: { type: string, description: "male|female" }
        dob: { type: ["string", "null"], format: date }
        phone: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        bloodType: { type: ["string", "null"] }
        emergencyContact: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
      required: [id, mrn, fullName, gender, createdAt]
    CreatePatientBody:
      type: object
      properties:
        fullName: { type: string }
        gender: { type: string }
        dob: { type: ["string", "null"], format: date }
        phone: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        bloodType: { type: ["string", "null"] }
        emergencyContact: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
      required: [fullName, gender]
    UpdatePatientBody:
      type: object
      properties:
        fullName: { type: string }
        phone: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        bloodType: { type: ["string", "null"] }
        emergencyContact: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    OpdVisit:
      type: object
      properties:
        id: { type: integer }
        patientId: { type: integer }
        patientName: { type: string }
        doctorId: { type: integer }
        doctorName: { type: string }
        appointmentAt: { type: string, format: date-time }
        complaint: { type: ["string", "null"] }
        diagnosis: { type: ["string", "null"] }
        status: { type: string, description: "scheduled|inprogress|done|cancelled" }
        fee: { type: number }
        createdAt: { type: string, format: date-time }
      required: [id, patientId, patientName, doctorId, doctorName, appointmentAt, status, fee, createdAt]
    CreateOpdVisitBody:
      type: object
      properties:
        patientId: { type: integer }
        doctorId: { type: integer }
        appointmentAt: { type: string, format: date-time }
        complaint: { type: ["string", "null"] }
        fee: { type: number }
      required: [patientId, doctorId, appointmentAt, fee]
    UpdateOpdVisitBody:
      type: object
      properties:
        diagnosis: { type: ["string", "null"] }
        status: { type: string }

    Bed:
      type: object
      properties:
        id: { type: integer }
        room: { type: string }
        bedNumber: { type: string }
        ward: { type: string }
        occupied: { type: boolean }
      required: [id, room, bedNumber, ward, occupied]

    Admission:
      type: object
      properties:
        id: { type: integer }
        patientId: { type: integer }
        patientName: { type: string }
        bedId: { type: integer }
        bedLabel: { type: string }
        doctorId: { type: integer }
        doctorName: { type: string }
        admittedAt: { type: string, format: date-time }
        dischargedAt: { type: ["string", "null"], format: date-time }
        reason: { type: ["string", "null"] }
        status: { type: string, description: "active|discharged" }
        dailyRate: { type: number }
      required: [id, patientId, patientName, bedId, bedLabel, doctorId, doctorName, admittedAt, status, dailyRate]
    CreateAdmissionBody:
      type: object
      properties:
        patientId: { type: integer }
        bedId: { type: integer }
        doctorId: { type: integer }
        reason: { type: ["string", "null"] }
        dailyRate: { type: number }
      required: [patientId, bedId, doctorId, dailyRate]
    UpdateAdmissionBody:
      type: object
      properties:
        status: { type: string }
        dischargedAt: { type: ["string", "null"], format: date-time }
        reason: { type: ["string", "null"] }

